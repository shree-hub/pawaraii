<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawar AI - AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
                gemini: {
                    50: '#f0f9ff',
                    100: '#e0f2fe',
                    500: '#3b82f6',
                    600: '#2563eb',
                    900: '#1e3a8a',
                }
            }
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      body { font-family: 'Inter', sans-serif; }
      .markdown-content h1 { @apply text-2xl font-bold mb-3 mt-4; }
      .markdown-content h2 { @apply text-xl font-bold mb-2 mt-4; }
      .markdown-content p { @apply mb-2 leading-relaxed; }
      .markdown-content ul { @apply list-disc ml-5 mb-2; }
      .markdown-content code { @apply bg-slate-100 dark:bg-slate-800 px-1 py-0.5 rounded text-sm font-mono; }
      .markdown-content pre { @apply bg-slate-100 dark:bg-slate-800 p-3 rounded-lg overflow-x-auto mb-3; }

      .typing-cursor::after {
        content: '●';
        display: inline-block;
        color: #3b82f6;
        animation: blink 1s infinite;
        font-size: 0.8em;
        margin-left: 2px;
      }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white text-slate-900 antialiased transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100 min-h-screen flex flex-col">

<header class="bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-2 cursor-pointer" onclick="app.showView('HOME')">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
            </div>
            <span class="font-bold text-xl tracking-tight text-slate-900 dark:text-white">Pawar AI</span>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="app.toggleDarkMode()" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <i data-lucide="moon" id="theme-icon-moon" class="w-5 h-5 text-slate-600 dark:text-slate-400"></i>
                <i data-lucide="sun" id="theme-icon-sun" class="w-5 h-5 hidden text-slate-400"></i>
            </button>
        </div>
    </div>
</header>

<main id="app-container" class="flex-grow w-full flex flex-col"></main>

<div id="home-only-ads" class="max-w-7xl mx-auto px-4 py-4 w-full hidden">
    <div class="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-4 flex justify-center min-h-[100px] items-center">
        <div id="container-bbb369099d58a94e9f3e12851830fac9"></div>
        <script async="async" data-cfasync="false" src="https://pl28477181.effectivegatecpm.com/bbb369099d58a94e9f3e12851830fac9/invoke.js"></script>
    </div>
</div>

<footer class="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 py-6 mt-auto">
    <div class="max-w-7xl mx-auto px-4 text-center text-slate-400 dark:text-slate-500 text-xs">
        <p>&copy; <span id="year"></span> Pawar AI. <span id="model-status">By Vikas Pawar</span></p>
    </div>
</footer>

<script>
    const BACKEND_URL = "https://pawar-ai-backend-2.onrender.com/api/chat";
const state = {
    currentView: 'HOME',
    darkMode: localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches),
    modelName: 'Gemini (Secure Backend)',
    chat: { messages: [], isStreaming: false },
    notes: { topic: '', isUPSCDepth: false, content: '', isStreaming: false, error: null },
    quiz: { phase: 'config', config: { topic: '', exam: 'UPSC CSE', subject: 'General Studies', difficulty: 'Medium', questionCount: 5 }, questions: [], currentIndex: 0, answers: [], score: 0, loading: false, error: null }
};

const app = {
    init() {
        this.applyTheme();
        this.showView('HOME');
        document.getElementById('year').textContent = new Date().getFullYear();
        lucide.createIcons();
    },

    applyTheme() {
        if (state.darkMode) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon-moon').classList.add('hidden');
            document.getElementById('theme-icon-sun').classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            document.getElementById('theme-icon-moon').classList.remove('hidden');
            document.getElementById('theme-icon-sun').classList.add('hidden');
        }
    },

    toggleDarkMode() {
        state.darkMode = !state.darkMode;
        localStorage.setItem('theme', state.darkMode ? 'dark' : 'light');
        this.applyTheme();
    },

    showView(view) {
        state.currentView = view;
        this.render();
    },

    render() {
        const container = document.getElementById('app-container');
        const adContainer = document.getElementById('home-only-ads');
        if (adContainer) adContainer.style.display = (state.currentView === 'HOME') ? 'flex' : 'none';
        container.innerHTML = '';

        switch (state.currentView) {
            case 'HOME': container.innerHTML = this.templates.home(); break;
            case 'CHAT': container.innerHTML = this.templates.chat(); this.utils.scrollToBottom('chat-scroll-area'); setTimeout(() => document.getElementById('chat-input')?.focus(), 100); break;
            case 'NOTES': container.innerHTML = this.templates.notes(); if(state.notes.isStreaming) this.utils.scrollToBottom('notes-content'); break;
            case 'TEST': container.innerHTML = this.templates.quiz(); break;
        }
        lucide.createIcons();
    },

    templates: {
        home() {
            return `
            <div class="max-w-5xl mx-auto px-4 py-12 animate-in fade-in duration-500 w-full">
                <div class="text-center mb-16">
                    <h1 class="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-6 pb-2">
                        Pawar AI
                    </h1>
                    <p class="text-xl text-slate-500 dark:text-slate-400 max-w-2xl mx-auto">
                        Your intelligent companion for study, notes, and exam prep.
                    </p>
                </div>

                <div class="grid md:grid-cols-3 gap-6">
                    <button onclick="app.showView('CHAT')" class="group p-8 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-xl hover:border-blue-500/30 transition-all duration-300 text-left relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                            <i data-lucide="message-square" class="w-24 h-24 text-blue-600"></i>
                        </div>
                        <div class="w-12 h-12 bg-blue-100 dark:bg-blue-900/30 rounded-2xl flex items-center justify-center mb-6 text-blue-600 dark:text-blue-400 group-hover:scale-110 transition-transform">
                            <i data-lucide="sparkles" class="w-6 h-6"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Pawar AI Chat</h2>
                        <p class="text-slate-500 dark:text-slate-400 font-medium">Ask anything. Get instant, smart answers in any language.</p>
                    </button>

                    <button onclick="app.showView('NOTES')" class="group p-8 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-xl hover:border-purple-500/30 transition-all duration-300 text-left relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                            <i data-lucide="file-text" class="w-24 h-24 text-purple-600"></i>
                        </div>
                        <div class="w-12 h-12 bg-purple-100 dark:bg-purple-900/30 rounded-2xl flex items-center justify-center mb-6 text-purple-600 dark:text-purple-400 group-hover:scale-110 transition-transform">
                            <i data-lucide="book-open" class="w-6 h-6"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Note Maker</h2>
                        <p class="text-slate-500 dark:text-slate-400 font-medium">Turn any topic into structured, exam-ready study notes.</p>
                    </button>

                    <button onclick="app.showView('TEST')" class="group p-8 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-xl hover:border-emerald-500/30 transition-all duration-300 text-left relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                            <i data-lucide="check-circle" class="w-24 h-24 text-emerald-600"></i>
                        </div>
                        <div class="w-12 h-12 bg-emerald-100 dark:bg-emerald-900/30 rounded-2xl flex items-center justify-center mb-6 text-emerald-600 dark:text-emerald-400 group-hover:scale-110 transition-transform">
                            <i data-lucide="pen-tool" class="w-6 h-6"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Mock Tests</h2>
                        <p class="text-slate-500 dark:text-slate-400 font-medium">Test yourself with AI-generated quizzes on any subject.</p>
                    </button>
                </div>
            </div>
            `;
        },

        chat() {
            const { messages, isStreaming } = state.chat;
            return `
            <div class="flex flex-col h-[calc(100vh-64px-60px)] md:h-[calc(100vh-64px)] max-w-4xl mx-auto w-full relative">
                <div id="chat-scroll-area" class="flex-1 overflow-y-auto p-4 space-y-6 no-scrollbar pb-32">
                    ${messages.length === 0 ? `
                        <div class="h-full flex flex-col items-center justify-center animate-in fade-in duration-500 mt-[-50px]">
                            <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-blue-500/20">
                                <i data-lucide="sparkles" class="w-8 h-8 text-white"></i>
                            </div>
                            <h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-slate-800 to-slate-500 dark:from-white dark:to-slate-400 mb-2">Hello, I am Pawar AI</h2>
                            <p class="text-slate-500 dark:text-slate-400 text-lg">How can I help you learn today?</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-8 w-full max-w-lg">
                                <button onclick="document.getElementById('chat-input').value='Explain Quantum Physics simply'; app.actions.sendChatMessage()" class="p-4 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 hover:border-blue-400 dark:hover:border-blue-600 transition-colors text-left text-sm text-slate-600 dark:text-slate-300">
                                    Explain Quantum Physics simply
                                </button>
                                <button onclick="document.getElementById('chat-input').value='Summarize the French Revolution'; app.actions.sendChatMessage()" class="p-4 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 hover:border-blue-400 dark:hover:border-blue-600 transition-colors text-left text-sm text-slate-600 dark:text-slate-300">
                                    Summarize the French Revolution
                                </button>
                            </div>
                        </div>
                    ` : ''}

                    ${messages.map((msg, index) => `
                        <div class="flex w-full ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-2 duration-300">
                            <div class="max-w-[85%] md:max-w-[75%] rounded-2xl px-5 py-4 shadow-sm text-base leading-relaxed ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-br-sm' : 'bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 rounded-bl-sm'}">
                                ${msg.role === 'user' ? msg.text : app.utils.renderMarkdown(msg.text)}
                                ${(msg.role === 'model' && index === messages.length - 1 && isStreaming) ? '<span class="typing-cursor"></span>' : ''}
                            </div>
                        </div>
                    `).join('')}
                    <div id="chat-anchor"></div>
                </div>

                <div class="absolute bottom-4 left-4 right-4 md:left-0 md:right-0 max-w-3xl mx-auto">
                    <form onsubmit="event.preventDefault(); app.actions.sendChatMessage();" class="relative">
                        <input type="text" id="chat-input"
                            placeholder="Ask Pawar AI anything..."
                            autocomplete="off"
                            class="w-full h-14 pl-6 pr-14 rounded-full bg-white dark:bg-slate-900 border-2 border-slate-200 dark:border-slate-700 shadow-xl shadow-slate-200/50 dark:shadow-none focus:border-blue-500 dark:focus:border-blue-500 focus:ring-0 outline-none transition-all text-slate-800 dark:text-slate-100 placeholder:text-slate-400"
                        >
                        <button type="submit" ${isStreaming ? 'disabled' : ''} class="absolute right-2 top-2 p-2.5 bg-blue-600 text-white rounded-full hover:bg-blue-700 disabled:bg-slate-400 transition-colors">
                            ${isStreaming ? '<i data-lucide="square" class="w-5 h-5 fill-current"></i>' : '<i data-lucide="arrow-up" class="w-5 h-5"></i>'}
                        </button>
                    </form>
                    <div class="text-center mt-2">
                        <button onclick="app.showView('HOME')" class="text-xs text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">Back to Home</button>
                    </div>
                </div>
            </div>
            `;
        },

        notes() {
            const { topic, isUPSCDepth, isStreaming, content, error } = state.notes;
            let resultHtml = '';

            if (content || isStreaming) {
                resultHtml = `
                    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden mb-12">
                        <div class="bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
                            <h3 class="font-bold text-slate-800 dark:white truncate flex items-center gap-2">
                                <i data-lucide="file-text" class="w-4 h-4 text-purple-500"></i>
                                ${topic}
                            </h3>
                            <button onclick="app.actions.copyNotes()" class="text-xs font-bold text-purple-600 uppercase tracking-wider hover:bg-purple-50 dark:hover:bg-purple-900/30 px-3 py-1 rounded transition-colors">
                                <span id="copy-btn-text">Copy</span>
                            </button>
                        </div>
                        <div id="notes-content" class="p-8 bg-white dark:bg-slate-900 min-h-[300px] markdown-content ${isStreaming ? 'typing-cursor' : ''}">
                            ${app.utils.renderMarkdown(content)}
                        </div>
                    </div>
                `;
            }

            return `
                <div class="max-w-4xl mx-auto px-4 py-8">
                    <div class="flex items-center justify-between mb-8">
                        <button onclick="app.showView('HOME')" class="flex items-center text-slate-500 hover:text-slate-900 dark:hover:text-white transition-colors">
                            <i data-lucide="arrow-left" class="w-5 h-5 mr-2"></i> Back
                        </button>
                        <h2 class="text-2xl font-bold text-slate-900 dark:text-white">AI Note Maker</h2>
                    </div>

                    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-6 mb-8 shadow-sm">
                        <div class="flex flex-col gap-4">
                            <input type="text" id="notes-topic-input" value="${topic}" placeholder="Enter topic (e.g. Photosynthesis)"
                                class="w-full rounded-xl border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 p-4 outline-none focus:border-purple-500 transition-all">

                            <div class="flex items-center justify-between">
                                <label class="flex items-center gap-3 cursor-pointer select-none">
                                    <div class="relative">
                                        <input type="checkbox" id="upsc-toggle" class="sr-only" ${isUPSCDepth ? 'checked' : ''} onchange="state.notes.isUPSCDepth = this.checked">
                                        <div class="block w-12 h-7 bg-slate-200 dark:bg-slate-800 rounded-full transition-colors peer-checked:bg-purple-600"></div>
                                        <div class="dot absolute left-1 top-1 bg-white w-5 h-5 rounded-full transition-transform"></div>
                                    </div>
                                    <span class="text-sm font-medium text-slate-600 dark:text-slate-300">Detailed Mode</span>
                                </label>

                                <button onclick="app.actions.generateNotes()" ${isStreaming ? 'disabled' : ''} class="px-8 py-3 bg-purple-600 text-white font-bold rounded-xl hover:bg-purple-700 transition-colors disabled:opacity-50 flex items-center gap-2">
                                    ${isStreaming ? '<i data-lucide="loader-2" class="animate-spin w-4 h-4"></i> Generating' : 'Generate Notes'}
                                </button>
                            </div>
                        </div>
                        ${error ? `<p class="mt-4 text-red-500 text-sm font-medium">${error}</p>` : ''}
                    </div>
                    <div id="notes-result-container">${resultHtml}</div>
                </div>
            `;
        },

        quiz() {
            const { phase, config, currentIndex, questions, answers, score, error } = state.quiz;

            if (phase === 'config') {
                return `
                <div class="max-w-2xl mx-auto px-4 py-8">
                    <button onclick="app.showView('HOME')" class="mb-6 flex items-center text-slate-500 hover:text-slate-900 dark:hover:text-white">
                        <i data-lucide="arrow-left" class="w-5 h-5 mr-2"></i> Back
                    </button>
                    <h2 class="text-3xl font-bold mb-8 text-slate-900 dark:text-white">Mock Test Config</h2>

                    <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm space-y-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Exam Type</label>
                            <select id="quiz-exam" class="w-full rounded-xl bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 p-3 outline-none focus:border-emerald-500">
                                <option ${config.exam === 'UPSC CSE' ? 'selected' : ''}>UPSC CSE</option>
                                <option ${config.exam === 'JEE Mains' ? 'selected' : ''}>JEE Mains</option>
                                <option ${config.exam === 'NEET' ? 'selected' : ''}>NEET</option>
                                <option ${config.exam === 'General Academic' ? 'selected' : ''}>General Academic</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Topic</label>
                            <input type="text" id="quiz-topic" value="${config.topic}" placeholder="e.g. Thermodynamics" class="w-full rounded-xl bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 p-3 outline-none focus:border-emerald-500">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Difficulty</label>
                                <select id="quiz-difficulty" class="w-full rounded-xl bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 p-3 outline-none focus:border-emerald-500">
                                    <option>Easy</option><option selected>Medium</option><option>Hard</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Length</label>
                                <select id="quiz-count" class="w-full rounded-xl bg-slate-50 dark:bg-slate-950 border-slate-200 dark:border-slate-800 p-3 outline-none focus:border-emerald-500">
                                    <option value="5">5 Questions</option><option value="10">10 Questions</option>
                                </select>
                            </div>
                        </div>

                        <button onclick="app.actions.startQuiz()" class="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-500/20">
                            Start Test
                        </button>
                        ${error ? `<p class="text-center text-red-500 font-medium">${error}</p>` : ''}
                    </div>
                </div>
                `;
            }

            if (phase === 'loading') {
                return `
                <div class="flex flex-col items-center justify-center h-[60vh]">
                    <div class="w-16 h-16 border-4 border-emerald-100 border-t-emerald-600 rounded-full animate-spin mb-6"></div>
                    <h2 class="text-2xl font-bold">Generating Questions...</h2>
                    <p class="text-slate-500">Powered by Gemini (Secure)</p>
                </div>
                `;
            }

            if (phase === 'active') {
                const q = questions[currentIndex];
                const progress = ((currentIndex + 1) / questions.length) * 100;
                return `
                <div class="max-w-2xl mx-auto px-4 py-8">
                    <div class="mb-4">
                        <button onclick="state.quiz.phase='config'; app.render()" class="mb-4 flex items-center text-slate-500 hover:text-slate-900 dark:hover:text-white text-sm font-medium transition-colors">
                            <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Exit Test
                        </button>

                        <div class="flex justify-between text-sm font-bold text-slate-500 mb-2">
                            <span>Question ${currentIndex + 1} / ${questions.length}</span>
                            <span>${config.exam}</span>
                        </div>
                        <div class="h-2 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                            <div class="h-full bg-emerald-500 transition-all duration-300" style="width: ${progress}%"></div>
                        </div>
                    </div>

                    <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl border border-slate-200 dark:border-slate-800 shadow-sm">
                        <h3 class="text-xl font-bold mb-8 leading-relaxed">${q.question}</h3>
                        <div class="space-y-3">
                            ${q.options.map((opt, i) => `
                                <button onclick="app.actions.selectAnswer(${i})" class="w-full text-left p-4 rounded-xl border-2 transition-all flex items-center gap-4 ${answers[currentIndex] === i ? 'border-emerald-500 bg-emerald-50 dark:bg-emerald-900/20' : 'border-slate-100 dark:border-slate-800 hover:border-emerald-200 dark:hover:border-emerald-800'}">
                                    <span class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${answers[currentIndex] === i ? 'bg-emerald-500 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-500'}">${String.fromCharCode(65 + i)}</span>
                                    <span class="text-slate-700 dark:text-slate-200">${opt}</span>
                                </button>
                            `).join('')}
                        </div>
                        <div class="mt-8 flex justify-end">
                            <button onclick="app.actions.nextQuestion()" ${answers[currentIndex] === undefined ? 'disabled' : ''} class="px-8 py-3 bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700 disabled:opacity-50 transition-colors">
                                ${currentIndex === questions.length - 1 ? 'Submit' : 'Next'}
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }

            if (phase === 'review') {
                return `
                <div class="max-w-3xl mx-auto px-4 py-8">
                    <div class="text-center mb-12">
                        <div class="w-20 h-20 bg-emerald-100 dark:bg-emerald-900/30 rounded-full flex items-center justify-center mx-auto mb-6 text-emerald-600">
                            <i data-lucide="award" class="w-10 h-10"></i>
                        </div>
                        <h2 class="text-4xl font-bold mb-2 text-slate-900 dark:text-white">Score: ${score} / ${questions.length}</h2>
                        <button onclick="state.quiz.phase='config'; app.render()" class="text-emerald-600 font-bold hover:underline">Take Another Test</button>
                    </div>
                    <div class="space-y-6 pb-20">
                        ${questions.map((q, i) => `
                            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800">
                                <div class="flex gap-4">
                                    <span class="mt-1 w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-bold text-white ${answers[i] === q.correctAnswerIndex ? 'bg-green-500' : 'bg-red-500'}">
                                        ${answers[i] === q.correctAnswerIndex ? '✓' : '✕'}
                                    </span>
                                    <div>
                                        <h3 class="font-bold mb-3 text-slate-900 dark:text-white">${q.question}</h3>
                                        <p class="text-sm text-slate-500 mb-2">Correct Answer: <span class="font-bold text-green-600">${q.options[q.correctAnswerIndex]}</span></p>
                                        <div class="bg-slate-50 dark:bg-slate-950 p-3 rounded-lg text-sm text-slate-600 dark:text-slate-400">
                                            <span class="font-bold">Explanation:</span> ${q.explanation}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                `;
            }
        }
    },

    actions: {
        async sendChatMessage() {
            const inputEl = document.getElementById('chat-input');
            const text = inputEl.value.trim();
            if(!text) return;

            state.chat.messages.push({ role: 'user', text: text });
            inputEl.value = '';
            state.chat.isStreaming = true;
            state.chat.messages.push({ role: 'model', text: '' });
            app.render();
            app.utils.scrollToBottom('chat-scroll-area');

            try {
                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                const reply = data.reply || "No response from AI.";

                state.chat.messages[state.chat.messages.length - 1].text = reply;
            } catch (err) {
                state.chat.messages[state.chat.messages.length - 1].text = "Connection Error. Please try again.";
            } finally {
                state.chat.isStreaming = false;
                app.render();
                setTimeout(() => document.getElementById('chat-input')?.focus(), 50);
            }
        },

        async generateNotes() {
            const topicInput = document.getElementById('notes-topic-input');
            const topic = topicInput?.value || state.notes.topic;
            if (!topic) return;

            state.notes.topic = topic;
            state.notes.content = "";
            state.notes.isStreaming = true;
            state.notes.error = null;
            app.render();

            try {
                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: `Generate detailed study notes on: ${topic}` })
                });

                const data = await response.json();
                state.notes.content = data.reply || "No response.";
            } catch (err) {
                state.notes.error = "Connection error. Please try again.";
            } finally {
                state.notes.isStreaming = false;
                app.render();
            }
        },

        copyNotes() {
            if (state.notes.content) {
                navigator.clipboard.writeText(state.notes.content);
                const btn = document.getElementById('copy-btn-text');
                if (btn) btn.textContent = 'Copied!';
                setTimeout(() => { if (btn) btn.textContent = 'Copy'; }, 2000);
            }
        },

        async startQuiz() {
            const topic = document.getElementById('quiz-topic')?.value;
            if (!topic) return alert("Please enter a topic");

            const config = state.quiz.config;
            config.topic = topic;
            config.exam = document.getElementById('quiz-exam').value;
            config.difficulty = document.getElementById('quiz-difficulty').value;
            config.questionCount = parseInt(document.getElementById('quiz-count').value);

            state.quiz.phase = 'loading';
            state.quiz.error = null;
            app.render();

            try {
                const prompt = `Generate a JSON array of ${config.questionCount} multiple choice questions for ${config.exam} on "${config.topic}". Difficulty: ${config.difficulty}. Format: [{"question": "...", "options": ["A", "B", "C", "D"], "correctAnswerIndex": 0, "explanation": "..."}]. Return ONLY JSON.`;

                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: prompt })
                });

                const data = await response.json();
                const jsonText = data.reply.replace(/```json\n?|\n?```/g, '').trim();
                state.quiz.questions = JSON.parse(jsonText);
                state.quiz.answers = [];
                state.quiz.currentIndex = 0;
                state.quiz.phase = 'active';
            } catch (err) {
                state.quiz.error = "Failed to generate quiz. Try a simpler topic.";
                state.quiz.phase = 'config';
            } finally {
                app.render();
            }
        },

        selectAnswer(idx) {
            state.quiz.answers[state.quiz.currentIndex] = idx;
            app.render();
        },

        nextQuestion() {
            const { currentIndex, questions } = state.quiz;
            if (currentIndex < questions.length - 1) {
                state.quiz.currentIndex++;
            } else {
                state.quiz.score = questions.reduce((acc, q, i) => acc + (state.quiz.answers[i] === q.correctAnswerIndex ? 1 : 0), 0);
                state.quiz.phase = 'review';
            }
            app.render();
        }
    },

    utils: {
        scrollToBottom(id) {
            const el = document.getElementById(id);
            if(el) el.scrollTop = el.scrollHeight;
        },
        renderMarkdown(text) {
            if (!text) return '';
            return text
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/^\- (.*$)/gim, '<li>$1</li>')
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/\n/gim, '<br>')
                .replace(/(<li>.*<\/li>)/gim, '<ul>$1</ul>');
        }
    }
};

window.app = app;
window.state = state;
app.init();
</script>

</body>
</html>
